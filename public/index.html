<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>差旅代墊紀錄</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <section id="login" class="login card">
        <p class="eyebrow">REIMBURSEMENT RECORDS</p>
        <h1>差旅代墊紀錄</h1>
        <p class="muted">私人管理頁面，請輸入密碼。</p>
        <form id="login-form">
          <label
            >管理密碼<input
              name="password"
              type="password"
              autocomplete="current-password"
              required /></label
          ><button>安全登入</button>
          <p class="error"></p>
        </form>
      </section>
      <section id="app" hidden>
        <header>
          <div>
            <p class="eyebrow">TRAVEL LEDGER</p>
            <h1>差旅代墊紀錄</h1>
          </div>
          <button class="ghost" id="logout">登出</button>
        </header>
        <div class="toolbar">
          <label>查看月份<input id="month" type="month" /></label>
          <div class="summary">
            <span>本月代墊</span><strong id="total">NT$0</strong><small id="count">0 筆</small>
          </div>
        </div>
        <nav>
          <button data-tab="expenses" class="active">費用紀錄</button
          ><button data-tab="members">委員交通</button>
        </nav>
        <section id="expenses" class="panel active">
          <form id="expense-form" class="card form-grid">
            <h2>新增代墊費用</h2>
            <label>日期<input name="expense_date" type="date" required /></label
            ><label
              >分類<select name="category">
                <option>交通</option>
                <option>餐費</option>
                <option>住宿</option>
                <option>雜支</option>
                <option>其他</option>
              </select></label
            ><label class="wide">項目說明<input name="description" required /></label
            ><label>金額（NT$）<input name="amount" type="number" min="0" required /></label
            ><label
              >關聯委員<select name="member_id" id="expense-member">
                <option value="">無</option>
              </select></label
            ><label
              >付款方式<select name="payment_method">
                <option>現金</option>
                <option>信用卡</option>
                <option>行動支付</option>
                <option>轉帳</option>
              </select></label
            ><label>憑證編號<input name="receipt_number" /></label
            ><label class="wide"
              >佐證圖片（最大 8MB）<input
                name="attachment"
                type="file"
                accept="image/jpeg,image/png,image/webp,image/gif" /></label
            ><label class="wide">備註<textarea name="note"></textarea></label
            ><button class="wide">儲存費用</button>
            <p class="error wide"></p>
          </form>
          <div id="expense-list" class="records"></div>
        </section>
        <section id="members" class="panel">
          <form id="member-form" class="card form-grid">
            <h2>新增委員交通資料</h2>
            <label>委員姓名<input name="name" required /></label
            ><label
              >交通方式<input
                name="transport_mode"
                required
                placeholder="高鐵、台鐵、計程車…" /></label
            ><label class="wide">路線<input name="route" /></label
            ><label
              >預估交通費（NT$）<input
                name="fare"
                type="number"
                min="0"
                value="0"
                required /></label
            ><label class="wide">備註<textarea name="note"></textarea></label
            ><button class="wide">儲存委員</button>
            <p class="error wide"></p>
          </form>
          <div id="member-list" class="records"></div>
        </section>
      </section>
    </main>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
