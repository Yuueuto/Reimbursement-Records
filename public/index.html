<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>差旅代墊紀錄</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#245c49" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <section id="login" class="login card">
        <p class="eyebrow">REIMBURSEMENT RECORDS</p>
        <h1>差旅代墊紀錄</h1>
        <p class="muted">私人管理頁面，請輸入密碼。</p>
        <form id="login-form">
          <label
            >管理密碼<input
              name="password"
              type="password"
              autocomplete="current-password"
              required /></label
          ><button>安全登入</button>
          <p class="error"></p>
        </form>
      </section>
      <section id="app" hidden>
        <header>
          <div>
            <p class="eyebrow">TRAVEL LEDGER</p>
            <h1>差旅代墊紀錄</h1>
          </div>
          <button class="ghost" id="logout">登出</button>
        </header>
        <div class="toolbar">
          <label>查看月份<input id="month" type="month" /></label>
          <div class="summary">
            <span>本月代墊</span><strong id="total">NT$0</strong><small id="count">0 筆</small>
          </div>
        </div>
        <nav>
          <button data-tab="expenses" class="active">費用紀錄</button
          ><button data-tab="members">委員交通</button><button data-tab="roster">名冊管理</button>
        </nav>
        <section id="expenses" class="panel active">
          <form id="expense-form" class="card form-grid">
            <h2>新增代墊費用</h2>
            <label>日期<input name="expense_date" type="date" required /></label
            ><label
              >分類<select name="category">
                <option>交通</option>
                <option>餐費</option>
                <option>住宿</option>
                <option>雜支</option>
                <option>其他</option>
              </select></label
            ><label class="wide">項目說明<input name="description" required /></label
            ><label>金額（NT$）<input name="amount" type="number" min="0" required /></label
            ><label
              >關聯委員<select name="member_id" id="expense-member">
                <option value="">無</option>
              </select></label
            ><label
              >付款方式<select name="payment_method">
                <option>現金</option>
                <option>信用卡</option>
                <option>行動支付</option>
                <option>轉帳</option>
              </select></label
            ><label>憑證編號<input name="receipt_number" /></label
            ><label class="wide"
              >地點（受檢單位）<input
                name="location"
                list="place-names"
                autocomplete="off"
                placeholder="點選或輸入單位名稱" /></label
            ><label class="wide"
              >地址<input name="location_address" placeholder="選擇單位後自動帶入" /></label
            ><label class="wide"
              >佐證圖片（最大 8MB）<input
                name="attachment"
                type="file"
                accept="image/jpeg,image/png,image/webp,image/gif"
            /></label>
            <div class="wide capture-row">
              <button type="button" class="ghost" id="capture-btn">📷 截圖並框選區域</button>
              <button type="button" class="ghost" id="capture-clear" hidden>清除圖片</button>
            </div>
            <img id="capture-preview" class="wide" alt="圖片預覽" hidden />
            <label class="wide">備註<textarea name="note"></textarea></label
            ><button class="wide" id="expense-submit">儲存費用</button>
            <button type="button" class="ghost wide" id="expense-cancel" hidden>取消編輯</button>
            <p class="error wide"></p>
          </form>
          <div class="records-col">
            <div class="list-tools">
              <label>篩選日期<input id="filter-date" type="date" /></label>
              <button type="button" class="ghost" id="filter-clear">顯示全部</button>
            </div>
            <div id="expense-list" class="records"></div>
          </div>
        </section>
        <section id="members" class="panel">
          <form id="member-form" class="card form-grid">
            <h2>新增委員交通資料</h2>
            <label
              >委員姓名<input name="name" list="member-names" autocomplete="off" required
            /></label>
            <datalist id="member-names"></datalist>
            <label>日期<input name="travel_date" type="date" required /></label>
            <label
              >交通方式<select name="transport_mode" id="member-mode">
                <option>高鐵</option>
                <option>台鐵</option>
                <option>客運</option>
                <option>計程車</option>
                <option>自行開車</option>
                <option>其他</option>
              </select></label
            >
            <label class="hsr-only checkbox"
              ><input type="checkbox" id="hsr-round" />來回（票價 ×2）</label
            >
            <label class="hsr-only">出發站<select id="hsr-from"></select></label>
            <label class="hsr-only">到達站<select id="hsr-to"></select></label>
            <label class="wide"
              >地點（受檢單位）<input
                name="location"
                list="place-names"
                autocomplete="off"
                placeholder="點選或輸入單位名稱"
            /></label>
            <label class="wide"
              >地址<input name="location_address" placeholder="選擇單位後自動帶入"
            /></label>
            <label class="wide"
              >路線<input name="route" id="member-route" placeholder="例：台北 → 左營"
            /></label>
            <label
              >預估交通費（NT$）<input
                name="fare"
                id="member-fare"
                type="number"
                min="0"
                value="0"
                required
            /></label>
            <label class="wide">備註<textarea name="note"></textarea></label>
            <button class="wide" id="member-submit">儲存委員</button>
            <button type="button" class="ghost wide" id="member-cancel" hidden>取消編輯</button>
            <p class="error wide"></p>
          </form>
          <div class="records-col">
            <div class="list-tools">
              <label>篩選日期<input id="member-filter-date" type="date" /></label>
              <button type="button" class="ghost" id="member-filter-clear">顯示全部</button>
            </div>
            <div id="member-list" class="records"></div>
          </div>
        </section>
        <section id="roster" class="panel roster-panel">
          <div class="card roster-group">
            <h2>委員名冊</h2>
            <p class="muted">在此增減委員姓名，會同步到「委員交通」的姓名快選清單。</p>
            <form id="people-form" class="inline-add">
              <input name="name" placeholder="新增委員姓名" autocomplete="off" required />
              <button>新增</button>
            </form>
            <p class="error" id="people-error"></p>
            <div id="people-list" class="chips"></div>
          </div>
          <div class="card roster-group">
            <h2>地點名冊</h2>
            <p class="muted">在此增減受檢單位，會同步到費用與委員的地點快選清單。</p>
            <form id="places-form" class="inline-add">
              <input name="name" placeholder="單位名稱" autocomplete="off" required />
              <input name="address" placeholder="地址（可留空）" autocomplete="off" />
              <button>新增</button>
            </form>
            <p class="error" id="places-error"></p>
            <div id="places-list" class="records"></div>
          </div>
        </section>
      </section>
      <datalist id="place-names"></datalist>
    </main>
    <div id="crop-overlay" hidden>
      <div class="crop-stage">
        <img id="crop-image" alt="截圖區域選取" />
        <div id="crop-box" hidden></div>
      </div>
      <div class="crop-bar">
        <span>用滑鼠拖曳，框選要擷取的區域</span>
        <button type="button" class="ghost" id="crop-cancel">取消</button>
        <button type="button" id="crop-confirm" disabled>確定裁切</button>
      </div>
    </div>
    <div id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
